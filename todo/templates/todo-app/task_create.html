{% load static %}
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Task – Taskflow</title>
    <meta name="description" content="Create a new task." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">✦</div>
            Taskflow
        </a>
        <div class="navbar-actions">
            <a href="index.html" class="nav-link">Tasks</a>
        </div>
    </nav>

    <!-- ========== MAIN ========== -->
    <main class="page-container" style="max-width:680px;">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="index.html">Tasks</a>
            <span class="breadcrumb-sep">›</span>
            <span>New Task</span>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Create Task</h1>
                <p class="page-subtitle">Fill in the details for your new task</p>
            </div>
        </div>

        <!-- ===== FORM CARD ===== -->
        <div class="card">
            <div class="card-body">

                <!--
          Django:
          <form method="POST" action="{% url 'task-create' %}">
            {% csrf_token %}
        -->
                <form action="index.html" method="GET" class="form-stack" id="create-form">

                    <!-- Title -->
                    <div class="form-group">
                        <label class="form-label" for="id_title">
                            Title <span class="required">*</span>
                        </label>
                        <!-- Django: {{ form.title }} -->
                        <input type="text" id="id_title" name="title" class="form-control"
                            placeholder="e.g. Review pull requests" maxlength="200" required autocomplete="off" />
                        <!-- Django: {{ form.title.errors }} -->
                        <!-- <div class="form-error">This field is required.</div> -->
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label class="form-label" for="id_description">Description</label>
                        <!-- Django: {{ form.description }} -->
                        <textarea id="id_description" name="description" class="form-control"
                            placeholder="Add notes, context, or acceptance criteria for this task…" rows="4"></textarea>
                    </div>

                    <!-- Priority + Due Date -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="id_priority">Priority</label>
                            <!-- Django: {{ form.priority }} -->
                            <select id="id_priority" name="priority" class="form-control">
                                <option value="low">🟢 Low</option>
                                <option value="medium" selected>🟡 Medium</option>
                                <option value="high">🔴 High</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="id_due_date">Due Date</label>
                            <!-- Django: {{ form.due_date }} -->
                            <input type="date" id="id_due_date" name="due_date" class="form-control" />
                        </div>
                    </div>

                    <!-- Tags -->
                    <div class="form-group">
                        <label class="form-label" for="id_tags">
                            Tags
                            <span class="form-hint">Comma-separated, e.g. design, frontend, urgent</span>
                        </label>
                        <!-- Django: {{ form.tags }} -->
                        <input type="text" id="id_tags" name="tags" class="form-control"
                            placeholder="design, backend, urgent" autocomplete="off" />
                    </div>

                </form>
                <!-- Django: </form> -->

            </div>
            <div class="card-footer" style="justify-content:flex-end;">
                <a href="index.html" class="btn btn-ghost">Cancel</a>
                <!-- submits the form above -->
                <button type="submit" form="create-form" class="btn btn-primary">Create Task</button>
            </div>
        </div>
        <!-- /.card -->

    </main>

</body>

</html>
