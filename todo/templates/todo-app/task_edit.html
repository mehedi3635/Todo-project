{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Task – Taskflow</title>
    <meta name="description" content="Edit an existing task." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">✦</div>
            Taskflow
        </a>
        <div class="navbar-actions">
            <a href="index.html" class="nav-link">Tasks</a>
        </div>
    </nav>

    <!-- ========== MAIN ========== -->
    <main class="page-container" style="max-width:680px;">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="index.html">Tasks</a>
            <span class="breadcrumb-sep">›</span>
            <!-- Django: <a href="{% url 'task-detail' task.pk %}">{{ task.title }}</a> -->
            <a href="task_detail.html">Design the landing page</a>
            <span class="breadcrumb-sep">›</span>
            <span>Edit</span>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Edit Task</h1>
                <p class="page-subtitle">Update the task details below</p>
            </div>
        </div>

        <!-- ===== FORM CARD ===== -->
        <div class="card">
            <div class="card-body">

                <!--
          Django:
          <form method="POST" action="{% url 'task-update' task.pk %}">
            {% csrf_token %}
        -->
                <form action="task_detail.html" method="GET" class="form-stack" id="edit-form">

                    <!-- Title -->
                    <div class="form-group">
                        <label class="form-label" for="id_title">
                            Title <span class="required">*</span>
                        </label>
                        <!-- Django: {{ form.title }} — pre-filled with task.title -->
                        <input type="text" id="id_title" name="title" class="form-control"
                            value="Design the landing page" maxlength="200" required autocomplete="off" />
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label class="form-label" for="id_description">Description</label>
                        <!-- Django: {{ form.description }} -->
                        <textarea id="id_description" name="description" class="form-control"
                            rows="4">Create wireframes and high-fidelity mockups for the new marketing landing page. Coordinate with the design team and get sign-off before implementation begins.</textarea>
                    </div>

                    <!-- Priority + Due Date -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="id_priority">Priority</label>
                            <!-- Django: {{ form.priority }} -->
                            <select id="id_priority" name="priority" class="form-control">
                                <option value="low">🟢 Low</option>
                                <option value="medium">🟡 Medium</option>
                                <option value="high" selected>🔴 High</option>
                                <!-- Django: selected based on task.priority -->
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="id_due_date">Due Date</label>
                            <!-- Django: {{ form.due_date }} -->
                            <input type="date" id="id_due_date" name="due_date" class="form-control"
                                value="2026-03-01" />
                        </div>
                    </div>

                    <!-- Status -->
                    <div class="form-group">
                        <label class="form-label" for="id_status">Status</label>
                        <!-- Django: {{ form.status }} -->
                        <select id="id_status" name="status" class="form-control">
                            <option value="active" selected>Active</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <!-- Tags -->
                    <div class="form-group">
                        <label class="form-label" for="id_tags">
                            Tags
                            <span class="form-hint">Comma-separated, e.g. design, frontend</span>
                        </label>
                        <!-- Django: {{ form.tags }} -->
                        <input type="text" id="id_tags" name="tags" class="form-control"
                            value="design, frontend, urgent" autocomplete="off" />
                    </div>

                </form>
                <!-- Django: </form> -->

            </div>
            <div class="card-footer">
                <a href="task_delete.html" class="btn btn-danger btn-sm">✕ Delete</a>
                <div style="flex:1;"></div>
                <a href="task_detail.html" class="btn btn-ghost">Cancel</a>
                <button type="submit" form="edit-form" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
        <!-- /.card -->

    </main>

</body>

</html>
